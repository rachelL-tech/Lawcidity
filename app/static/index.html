<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>判決引用排行</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      font-size: 14px;
      background: #f5f5f5;
      color: #222;
    }

    header {
      background: #1a1a2e;
      color: #fff;
      padding: 16px 24px;
    }
    header h1 { font-size: 18px; font-weight: 600; }
    header p  { font-size: 12px; opacity: .6; margin-top: 2px; }

    main { max-width: 1100px; margin: 24px auto; padding: 0 16px; }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,.1);
    }
    thead th {
      background: #1a1a2e;
      color: #fff;
      text-align: left;
      padding: 10px 14px;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: .03em;
    }
    tbody tr.row-target {
      cursor: pointer;
      border-bottom: 1px solid #eee;
      transition: background .1s;
    }
    tbody tr.row-target:hover { background: #f0f4ff; }
    tbody tr.row-target.open   { background: #eef2ff; }

    td { padding: 10px 14px; vertical-align: top; }

    .badge {
      display: inline-block;
      background: #e8eaff;
      color: #3730a3;
      border-radius: 12px;
      padding: 2px 10px;
      font-size: 12px;
      font-weight: 600;
    }
    .case-ref { font-weight: 500; }
    .court    { color: #555; font-size: 12px; }

    /* Snippet 展開區 */
    tr.row-snippets { display: none; }
    tr.row-snippets.open { display: table-row; }
    tr.row-snippets td {
      padding: 0;
      background: #f8f9ff;
    }

    .snippets-wrap {
      padding: 12px 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .snippet-card {
      background: #fff;
      border: 1px solid #dde3ff;
      border-left: 4px solid #6366f1;
      border-radius: 6px;
      padding: 10px 14px;
    }
    .snippet-meta {
      font-size: 11px;
      color: #666;
      margin-bottom: 6px;
    }
    .snippet-meta strong { color: #333; }
    .snippet-text {
      white-space: pre-wrap;
      line-height: 1.7;
      font-size: 13px;
      color: #333;
    }
    .raw-match {
      display: inline-block;
      background: #fef9c3;
      border-radius: 3px;
      padding: 0 3px;
      font-size: 11px;
      color: #92400e;
    }

    .statute-tags {
      margin-top: 6px;
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }
    .statute-tag {
      display: inline-block;
      background: #f0fdf4;
      border: 1px solid #86efac;
      color: #166534;
      border-radius: 4px;
      padding: 1px 7px;
      font-size: 11px;
    }

    .loading { color: #888; padding: 8px 14px; font-style: italic; }
    .rank-num { color: #999; font-size: 12px; width: 36px; }

    .toggle-icon { float: right; color: #6366f1; font-size: 16px; }

    .section-group  { margin-bottom: 12px; }
    .section-header { font-size: 12px; font-weight: 600; color: #444; padding: 4px 0; border-bottom: 1px solid #e5e7eb; margin-bottom: 8px; }
    .section-hint   { font-weight: normal; color: #888; margin-left: 6px; }

    .search-row { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:6px; align-items:center; }
    .search-row input { padding:6px 10px; border:1px solid #ccc; border-radius:4px; font-size:13px; }
    .exclude-row input { border-color:#f9a8a8; }
    .exclude-row input::placeholder { color:#b45252; }
    .input-label { font-size:11px; color:#888; align-self:center; white-space:nowrap; }
    .input-label.excl { color:#b45252; }

    .badge-resolution {
      display: inline-block;
      background: #fef3c7;
      color: #92400e;
      border: 1px solid #fcd34d;
      border-radius: 4px;
      padding: 1px 6px;
      font-size: 11px;
      font-weight: 600;
      margin-left: 6px;
      vertical-align: middle;
    }
  </style>
</head>
<body>

<header>
  <h1>判決引用排行</h1>
  <p>依被引用次數降冪排列｜點擊列展開 snippets</p>
</header>

<main>
  <div id="searchBar" style="margin-bottom:12px;">
    <div class="search-row">
      <input id="qInput" type="text" placeholder="關鍵字（空白分詞）" onkeydown="if(event.key==='Enter')doSearch()" style="flex:2;min-width:160px;">
      <span class="input-label">法條</span>
      <input id="lawInput" type="text" placeholder="法律名稱（如 勞動基準法）" onkeydown="if(event.key==='Enter')doSearch()" style="flex:2;min-width:140px;">
      <input id="articleInput" type="text" placeholder="條號（如 11、29之1）" onkeydown="if(event.key==='Enter')doSearch()" style="flex:1;min-width:100px;">
      <input id="subRefInput" type="text" placeholder="項款（如 第1項）" onkeydown="if(event.key==='Enter')doSearch()" style="flex:1;min-width:100px;">
    </div>
    <div class="search-row exclude-row">
      <span class="input-label excl">排除</span>
      <input id="excludeQInput" type="text" placeholder="排除關鍵字" onkeydown="if(event.key==='Enter')doSearch()" style="flex:2;min-width:160px;">
      <span class="input-label excl">排除法條</span>
      <input id="excludeLawInput" type="text" placeholder="法律名稱" onkeydown="if(event.key==='Enter')doSearch()" style="flex:2;min-width:140px;">
      <input id="excludeArticleInput" type="text" placeholder="條號（選填）" onkeydown="if(event.key==='Enter')doSearch()" style="flex:1;min-width:100px;">
      <button onclick="doSearch()" style="padding:6px 14px;background:#6366f1;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:13px;">搜尋</button>
      <button onclick="clearSearch()" style="padding:6px 14px;background:#e5e7eb;border:none;border-radius:4px;cursor:pointer;font-size:13px;">清除</button>
    </div>
  </div>
  <div id="searchInfo" style="font-size:12px;color:#666;margin-bottom:8px;"></div>
  <table id="tbl">
    <thead>
      <tr>
        <th style="width:40px">#</th>
        <th>被引用判決</th>
        <th style="width:120px">被引用法院</th>
        <th style="width:80px;text-align:center">被引用次數</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</main>

<script>
const tbody = document.getElementById('tbody');
let currentSearchCtx = null;

// ── 共用：把 article_raw 轉顯示字串 ──────────────────────────────────────────
function renderSnippetCard(s) {
  const srcRef = `${s.jyear}年度${s.jcase_norm}字第${s.jno}號`;
  const snip = (s.snippet || '').trim()
    .replace(/\r?\n(?![一二三四五六七八九十壹貳參肆伍陸柒捌玖㈠㈡㈢㈣㈤㈥㈦㈧㈨㈩①②③④⑤⑥⑦⑧⑨⑩⑴⑵⑶⑷⑸⑹⑺⑻⑼⑽⒈⒉⒊⒋⒌⒍⒎⒏⒐⒑（])/g, '');
  const statutes = s.statutes || [];
  const tagsHtml = statutes.length
    ? `<div class="statute-tags">${statutes.map(t => {
        const m = String(t.article).match(/^(\d+)(?:之(\d+))?$/);
        const art = m && m[2] ? `第${m[1]}條之${m[2]}` : `第${t.article}條`;
        return `<span class="statute-tag">${escHtml(t.law)}${art}${escHtml(t.sub || '')}</span>`;
      }).join('')}</div>`
    : '';
  return `
    <div class="snippet-card">
      <div class="snippet-meta">
        <strong>${escHtml(s.source_court || '')}</strong> ${escHtml(srcRef)}
        &nbsp;·&nbsp;
        <span class="raw-match">${escHtml(s.raw_match || '')}</span>
        &nbsp;·&nbsp;
        <span style="color:#aaa">citation #${s.citation_id}</span>
      </div>
      ${tagsHtml}
      <div class="snippet-text">${escHtml(snip)}</div>
    </div>`;
}

// ── 搜尋模式兩區塊 ────────────────────────────────────────────────────────────
function renderSearchSections(data) {
  const sc = data.search_context || {};
  const statuteLabels = (sc.statutes || []).map(s => {
    let label = s.law || '';
    if (s.article) {
      const m = String(s.article).match(/^(\d+)(?:之(\d+))?$/);
      label += m && m[2] ? `第${m[1]}條之${m[2]}` : `第${s.article}條`;
    }
    if (s.sub_ref) label += s.sub_ref;
    return label;
  }).filter(Boolean);
  const labelParts = [...(sc.query_terms || []), ...statuteLabels];
  const labelStr = labelParts.length ? `含「${escHtml(labelParts.join(' / '))}」` : '';
  const matched = data.matched_sources || [];
  const others  = data.other_sources  || [];
  if (!matched.length && !others.length) return '（無 snippet）';
  const parts = [];
  if (matched.length) {
    parts.push(`<div class="section-group">
      <div class="section-header">與你的搜尋相關（${matched.length} 筆）<span class="section-hint">${labelStr}</span></div>
      ${matched.map(renderSnippetCard).join('')}
    </div>`);
  }
  if (others.length) {
    parts.push(`<div class="section-group">
      <div class="section-header">其他引用本判決的案件（${others.length} 筆）</div>
      ${others.map(renderSnippetCard).join('')}
    </div>`);
  }
  return parts.join('');
}

// ── 通用 toggle 邏輯 ──────────────────────────────────────────────────────────
async function _doToggle(tr, trS, apiUrl, searchCtx) {
  if (tr.classList.contains('open')) {
    tr.classList.remove('open');
    trS.classList.remove('open');
    tr.querySelector('.toggle-icon').textContent = '▶';
    return;
  }
  tr.classList.add('open');
  trS.classList.add('open');
  tr.querySelector('.toggle-icon').textContent = '▼';
  if (trS.dataset.loaded) return;
  trS.dataset.loaded = '1';

  const res  = await fetch(apiUrl);
  const data = await res.json();
  const wrap = trS.querySelector('.snippets-wrap');
  wrap.classList.remove('loading');

  if (searchCtx && data.matched_sources !== undefined) {
    wrap.innerHTML = renderSearchSections(data);
  } else {
    const sources = data.sources || [];
    wrap.innerHTML = sources.length ? sources.map(renderSnippetCard).join('') : '（無 snippet）';
  }
}

function _buildCitationUrl(base, searchCtx) {
  if (!searchCtx) return base;
  const p = new URLSearchParams();
  if (searchCtx.q) p.append('q', searchCtx.q);
  (searchCtx.laws     || []).forEach(l => p.append('law',     l));
  (searchCtx.articles || []).forEach(a => p.append('article', a));
  (searchCtx.sub_refs || []).forEach(s => p.append('sub_ref', s));
  const qs = p.toString();
  return qs ? `${base}?${qs}` : base;
}

function toggle(tr, trS, targetId, caseRef, searchCtx) {
  _doToggle(tr, trS, _buildCitationUrl(`/api/decisions/${targetId}/citations`, searchCtx), searchCtx);
}

function toggleAuthority(tr, trS, authorityId, caseRef, searchCtx) {
  _doToggle(tr, trS, _buildCitationUrl(`/api/authorities/${authorityId}/citations`, searchCtx), searchCtx);
}

// ── 渲染排行列 ────────────────────────────────────────────────────────────────
const AUTH_BADGE_LABEL = { '決議': '決議', '釋字': '釋字', '法律座談會': '座談會', '研審小組意見': '研審' };

function renderRows(rows, searchCtx) {
  tbody.innerHTML = '';
  rows.forEach((r, i) => {
    const isAuthority = r.citation_type === 'authority';
    const authorityId = r.authority_id || r.target_authority_id;
    const court       = r.target_court || r.target_root_norm || '';
    const caseRef     = isAuthority
      ? (r.display_title || '（未知）')
      : `${r.jyear}年度${r.jcase_norm}字第${r.jno}號${r.doc_type || '裁判'}`;
    const typeBadge = isAuthority
      ? `<span class="badge-resolution">${AUTH_BADGE_LABEL[r.auth_type] || r.auth_type || ''}</span>`
      : '';
    // 搜尋模式顯示全域 total，主頁模式顯示 citation_count
    const displayCount = (searchCtx && r.total_citation_count != null)
      ? r.total_citation_count : r.citation_count;

    const tr = document.createElement('tr');
    tr.className = 'row-target';
    tr.innerHTML = `
      <td class="rank-num">${i + 1}</td>
      <td><span class="case-ref">${escHtml(caseRef)}</span>${typeBadge}<span class="toggle-icon">▶</span></td>
      <td><span class="court">${escHtml(court)}</span></td>
      <td style="text-align:center"><span class="badge">${displayCount}</span></td>
    `;
    const trS = document.createElement('tr');
    trS.className = 'row-snippets';
    trS.innerHTML = `<td colspan="4"><div class="snippets-wrap loading">載入中…</div></td>`;

    if (isAuthority) {
      tr.addEventListener('click', () => toggleAuthority(tr, trS, authorityId, caseRef, searchCtx));
    } else {
      tr.addEventListener('click', () => toggle(tr, trS, r.target_id, caseRef, searchCtx));
    }
    tbody.appendChild(tr);
    tbody.appendChild(trS);
  });
}

// ── 主頁排行 ──────────────────────────────────────────────────────────────────
async function loadRankings() {
  currentSearchCtx = null;
  const res  = await fetch('/api/rankings?limit=500');
  const rows = await res.json();
  renderRows(rows, null);
}

// ── 搜尋 ──────────────────────────────────────────────────────────────────────
async function doSearch() {
  const q          = document.getElementById('qInput').value.trim();
  const law        = document.getElementById('lawInput').value.trim();
  const article    = document.getElementById('articleInput').value.trim();
  const subRef     = document.getElementById('subRefInput').value.trim();
  const excludeQ   = document.getElementById('excludeQInput').value.trim();
  const excludeLaw = document.getElementById('excludeLawInput').value.trim();
  const excludeArt = document.getElementById('excludeArticleInput').value.trim();

  if (!q && !law && !excludeQ && !excludeLaw) { clearSearch(); return; }

  const p = new URLSearchParams();
  if (q)          p.append('q', q);
  if (law)        p.append('law', law);
  if (article)    p.append('article', article);
  if (subRef)     p.append('sub_ref', subRef);
  if (excludeQ)   p.append('exclude_q', excludeQ);
  if (excludeLaw) p.append('exclude_law', excludeLaw);
  if (excludeArt) p.append('exclude_article', excludeArt);

  const res  = await fetch(`/api/search?${p}`);
  const data = await res.json();

  currentSearchCtx = {
    q,
    laws:     law     ? [law]     : [],
    articles: article ? [article] : [],
    sub_refs: subRef  ? [subRef]  : [],
    query_terms: data.query_terms || [],
  };
  document.getElementById('searchInfo').textContent =
    `搜尋：${data.source_count} 篇來源判決 → ${data.targets.length} 個被引用目標`;
  renderRows(data.targets, currentSearchCtx);
}

function clearSearch() {
  currentSearchCtx = null;
  ['qInput','lawInput','articleInput','subRefInput',
   'excludeQInput','excludeLawInput','excludeArticleInput'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('searchInfo').textContent = '';
  loadRankings();
}

function escHtml(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

loadRankings();
</script>
</body>
</html>
