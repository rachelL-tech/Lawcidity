<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>搜尋驗證</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      font-size: 14px;
      background: #f5f5f5;
      color: #222;
    }
    header {
      background: #1a1a2e;
      color: #fff;
      padding: 16px 24px;
    }
    header h1 { font-size: 18px; font-weight: 600; }
    header p  { font-size: 12px; opacity: .6; margin-top: 2px; }
    main { max-width: 1200px; margin: 24px auto; padding: 0 16px; }
    .layout { display: flex; gap: 16px; align-items: flex-start; }
    .panel {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,.1);
      padding: 16px;
    }
    .left { width: 340px; }
    .right { flex: 1; }
    .field { margin-bottom: 12px; }
    .field label { display: block; font-size: 12px; color: #666; margin-bottom: 4px; }
    .field input, .field select, .field textarea {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
    }
    .row { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 6px; margin-bottom: 6px; }
    .row input { padding: 6px 8px; }
    .btn {
      display: inline-block;
      border: 1px solid #3b82f6;
      background: #3b82f6;
      color: #fff;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }
    .btn.secondary {
      background: #fff;
      color: #3b82f6;
    }
    .btn.small { padding: 4px 8px; font-size: 12px; }
    .error { color: #b91c1c; font-size: 12px; margin-top: 6px; }
    .summary { font-size: 12px; color: #666; margin-top: 8px; }
    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border-radius: 8px;
      overflow: hidden;
    }
    thead th {
      background: #1a1a2e;
      color: #fff;
      text-align: left;
      padding: 10px 12px;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: .03em;
    }
    tbody tr.row-target {
      cursor: pointer;
      border-bottom: 1px solid #eee;
      transition: background .1s;
    }
    tbody tr.row-target:hover { background: #f0f4ff; }
    tbody tr.row-target.open   { background: #eef2ff; }
    td { padding: 10px 12px; vertical-align: top; }
    .badge {
      display: inline-block;
      background: #e8eaff;
      color: #3730a3;
      border-radius: 12px;
      padding: 2px 10px;
      font-size: 12px;
      font-weight: 600;
    }
    .toggle-icon { float: right; color: #6366f1; font-size: 16px; }
    tr.row-snippets { display: none; }
    tr.row-snippets.open { display: table-row; }
    tr.row-snippets td { padding: 0; background: #f8f9ff; }
    .snippets-wrap { padding: 12px 14px 16px; display: flex; flex-direction: column; gap: 12px; }
    .snippet-card {
      background: #fff;
      border: 1px solid #dde3ff;
      border-left: 4px solid #6366f1;
      border-radius: 6px;
      padding: 10px 14px;
    }
    .snippet-meta { font-size: 11px; color: #666; margin-bottom: 6px; }
    .snippet-meta strong { color: #333; }
    .snippet-text { white-space: pre-wrap; line-height: 1.7; font-size: 13px; color: #333; }
    .raw-match {
      display: inline-block;
      background: #fef9c3;
      border-radius: 3px;
      padding: 0 3px;
      font-size: 11px;
      color: #92400e;
    }
    .statute-tags { margin-top: 6px; display: flex; flex-wrap: wrap; gap: 4px; }
    .statute-tag {
      display: inline-block;
      background: #f0fdf4;
      border: 1px solid #86efac;
      color: #166534;
      border-radius: 4px;
      padding: 1px 7px;
      font-size: 11px;
    }
    .loading { color: #888; padding: 8px 14px; font-style: italic; }
    .rank-num { color: #999; font-size: 12px; width: 36px; }
  </style>
</head>
<body>
<header>
  <h1>搜尋驗證</h1>
  <p>雙欄檢視｜/api/search 結果驗證</p>
</header>

<main>
  <div class="layout">
    <div class="panel left">
      <form id="search-form">
        <div class="field">
          <label>關鍵字 q（可擇一或與法條同時）</label>
          <input id="q" type="text" placeholder="例如：損害賠償">
        </div>
        <div class="field">
          <label>backend</label>
          <select id="backend">
            <option value="opensearch">opensearch</option>
            <option value="pg">pg</option>
          </select>
        </div>
        <div class="field">
          <label>case_type（逗號分隔）</label>
          <input id="case_type" type="text" placeholder="民事,刑事">
        </div>
        <div class="field">
          <label>法條（可重複）</label>
          <div id="law-rows"></div>
          <button class="btn secondary small" type="button" id="add-law">新增一列</button>
        </div>
        <div class="field">
          <label>排除關鍵字 exclude_q（可選）</label>
          <input id="exclude_q" type="text" placeholder="例如：假執行">
        </div>
        <div class="field">
          <label>排除法條（可重複）</label>
          <div id="exclude-law-rows"></div>
          <button class="btn secondary small" type="button" id="add-exclude-law">新增一列</button>
        </div>
        <div class="field">
          <label>limit</label>
          <input id="limit" type="number" min="1" max="500" value="100">
        </div>
        <button class="btn" type="submit">搜尋</button>
        <div id="form-error" class="error" style="display:none"></div>
        <div id="summary" class="summary"></div>
      </form>
    </div>

    <div class="panel right">
      <table id="tbl">
        <thead>
          <tr>
            <th style="width:40px">#</th>
            <th>目標</th>
            <th style="width:120px">法院/機關</th>
            <th style="width:80px;text-align:center">score</th>
            <th style="width:120px;text-align:center">keyword_score</th>
            <th style="width:120px;text-align:center">statute_score</th>
            <th style="width:80px;text-align:center">citations</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>
</main>

<script>
const tbody = document.getElementById('tbody');
const form = document.getElementById('search-form');
const formError = document.getElementById('form-error');
const summary = document.getElementById('summary');
const lawRows = document.getElementById('law-rows');
const excludeLawRows = document.getElementById('exclude-law-rows');

function escHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

function addLawRow(container, law = '', article = '', subRef = '') {
  const row = document.createElement('div');
  row.className = 'row';
  row.innerHTML = `
    <input type="text" placeholder="law" value="${escHtml(law)}">
    <input type="text" placeholder="article" value="${escHtml(article)}">
    <input type="text" placeholder="sub_ref" value="${escHtml(subRef)}">
    <button type="button" class="btn secondary small">刪除</button>
  `;
  row.querySelector('button').addEventListener('click', () => row.remove());
  container.appendChild(row);
}

document.getElementById('add-law').addEventListener('click', () => addLawRow(lawRows));
document.getElementById('add-exclude-law').addEventListener('click', () => addLawRow(excludeLawRows));
addLawRow(lawRows);
addLawRow(excludeLawRows);

function collectStatuteParams(container, label) {
  const rows = Array.from(container.querySelectorAll('.row'));
  const parsed = [];
  for (const row of rows) {
    const [lawEl, articleEl, subEl] = row.querySelectorAll('input');
    const law = lawEl.value.trim();
    const article = articleEl.value.trim();
    const sub = subEl.value.trim();
    if (!law && !article && !sub) continue;
    if (!law && article) {
      throw new Error(`${label}有填 article 時，必須填 law`);
    }
    if (!law && sub) {
      throw new Error(`${label}有填 sub_ref 時，必須填 law`);
    }
    parsed.push({ law, article, sub_ref: sub });
  }

  if (!parsed.length) {
    return { rows: [], includeArticle: false, includeSubRef: false };
  }

  const includeArticle = parsed.some((p) => p.article);
  const includeSubRef = parsed.some((p) => p.sub_ref);
  if (includeArticle && parsed.some((p) => !p.article)) {
    throw new Error(`${label}若有 article，則每列 law 都要有 article`);
  }

  return { rows: parsed, includeArticle, includeSubRef };
}

async function loadCitations(tr, trS, row) {
  const isOpen = tr.classList.contains('open');
  if (isOpen) {
    tr.classList.remove('open');
    trS.classList.remove('open');
    tr.querySelector('.toggle-icon').textContent = '▶';
    return;
  }
  tr.classList.add('open');
  trS.classList.add('open');
  tr.querySelector('.toggle-icon').textContent = '▼';

  if (trS.dataset.loaded) return;
  trS.dataset.loaded = '1';

  const endpoint = row.citation_type === 'authority'
    ? `/api/authorities/${row.target_authority_id}/citations`
    : `/api/decisions/${row.target_id}/citations`;

  const res = await fetch(endpoint);
  const data = await res.json();
  const wrap = trS.querySelector('.snippets-wrap');
  if (!data.sources || !data.sources.length) {
    wrap.textContent = '（無 snippet）';
    wrap.classList.remove('loading');
    return;
  }

  wrap.classList.remove('loading');
  wrap.innerHTML = data.sources.map(s => {
    const srcRef = `${s.jyear}年度${s.jcase_norm}字第${s.jno}號`;
    const snip   = (s.snippet || '').trim()
      .replace(/\r?\n(?![一二三四五六七八九十壹貳參肆伍陸柒捌玖㈠㈡㈢㈣㈤㈥㈦㈧㈨㈩①②③④⑤⑥⑦⑧⑨⑩⑴⑵⑶⑷⑸⑹⑺⑻⑼⑽⒈⒉⒊⒋⒌⒍⒎⒏⒐⒑（])/g, '');
    const statutes = (s.statutes || []);
    const tagsHtml = statutes.length
      ? `<div class="statute-tags">${statutes.map(t => {
          const m = String(t.article).match(/^(\d+)(?:之(\d+))?$/);
          const art = m && m[2] ? `第${m[1]}條之${m[2]}` : `第${t.article}條`;
          const sub = t.sub || '';
          return `<span class="statute-tag">${escHtml(t.law)}${art}${escHtml(sub)}</span>`;
        }).join('')}</div>`
      : '';
    return `
      <div class="snippet-card">
        <div class="snippet-meta">
          <strong>${escHtml(s.source_court)}</strong> ${escHtml(srcRef)}
          &nbsp;·&nbsp;
          <span class="raw-match">${escHtml(s.raw_match)}</span>
          &nbsp;·&nbsp;
          <span style="color:#aaa">citation #${s.citation_id}</span>
        </div>
        ${tagsHtml}
        <div class="snippet-text">${escHtml(snip)}</div>
      </div>`;
  }).join('');
}

function renderResults(data) {
  tbody.innerHTML = '';
  summary.textContent = `source_count=${data.source_count}｜query_terms=${(data.query_terms || []).join(', ')}`;
  (data.targets || []).forEach((r, i) => {
    const isAuthority = r.citation_type === 'authority';
    const caseRef = isAuthority
      ? (r.display_title || '（未知）') + (r.auth_type ? `（${r.auth_type}）` : '')
      : `${r.jyear}年度${r.jcase_norm}字第${r.jno}號${r.doc_type || '裁判'}`;
    const tr = document.createElement('tr');
    tr.className = 'row-target';
    tr.innerHTML = `
      <td class="rank-num">${i + 1}</td>
      <td>
        <span>${escHtml(caseRef)}</span>
        <span class="toggle-icon">▶</span>
      </td>
      <td>${escHtml(r.target_root_norm || '—')}</td>
      <td style="text-align:center"><span class="badge">${r.score}</span></td>
      <td style="text-align:center">${r.keyword_score_sum ?? 0}</td>
      <td style="text-align:center">${r.statute_score_sum ?? 0}</td>
      <td style="text-align:center">${r.citation_count}</td>
    `;

    const trS = document.createElement('tr');
    trS.className = 'row-snippets';
    trS.innerHTML = `<td colspan="7"><div class="snippets-wrap loading">載入中…</div></td>`;

    tr.addEventListener('click', () => loadCitations(tr, trS, r));
    tbody.appendChild(tr);
    tbody.appendChild(trS);
  });
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  formError.style.display = 'none';
  const q = document.getElementById('q').value.trim();

  let lawParams = { rows: [], includeArticle: false, includeSubRef: false };
  let excludeLawParams = { rows: [], includeArticle: false, includeSubRef: false };
  try {
    lawParams = collectStatuteParams(lawRows, '法條');
    excludeLawParams = collectStatuteParams(excludeLawRows, '排除法條');
  } catch (err) {
    formError.textContent = err.message || '法條格式錯誤';
    formError.style.display = 'block';
    return;
  }

  const hasQ = Boolean(q);
  const hasLaw = lawParams.rows.length > 0;
  if (!hasQ && !hasLaw) {
    formError.textContent = '請輸入關鍵字或法條（可擇一或都選）';
    formError.style.display = 'block';
    return;
  }

  const params = new URLSearchParams();
  if (hasQ) params.append('q', q);
  params.append('backend', document.getElementById('backend').value);
  const caseType = document.getElementById('case_type').value.trim();
  if (caseType) params.append('case_type', caseType);
  params.append('limit', document.getElementById('limit').value);
  for (const p of lawParams.rows) {
    params.append('law', p.law);
    if (lawParams.includeArticle) params.append('article', p.article);
    if (lawParams.includeSubRef) params.append('sub_ref', p.sub_ref);
  }

  const excludeQ = document.getElementById('exclude_q').value.trim();
  if (excludeQ) params.append('exclude_q', excludeQ);
  for (const p of excludeLawParams.rows) {
    params.append('exclude_law', p.law);
    if (excludeLawParams.includeArticle) params.append('exclude_article', p.article);
    if (excludeLawParams.includeSubRef) params.append('exclude_sub_ref', p.sub_ref);
  }

  tbody.innerHTML = `<tr><td colspan="7" class="loading">查詢中…</td></tr>`;
  summary.textContent = '';

  const res = await fetch(`/api/search?${params.toString()}`);
  if (!res.ok) {
    const text = await res.text();
    formError.textContent = `搜尋失敗：HTTP ${res.status} ${text}`;
    formError.style.display = 'block';
    tbody.innerHTML = '';
    return;
  }
  const data = await res.json();
  renderResults(data);
});
</script>
</body>
</html>
