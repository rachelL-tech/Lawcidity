# 用途：本機 MVP 服務（PostgreSQL + OpenSearch）。
# 說明：OpenSearch 以 security+password 模式啟動；搜尋 analyzer 由 index settings 定義（ngram）。
services:
  db:
    image: postgres:15-alpine
    container_name: lawcidity-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: citations
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d:ro # PostgreSQL 官方 image 的機制：容器第一次啟動時，會執行 /docker-entrypoint-initdb.d/ 內的所有 .sql 檔案，之後重啟不會再跑
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  opensearch:
    image: opensearchproject/opensearch:2.18.0
    container_name: lawcidity-opensearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: "${OPENSEARCH_INITIAL_ADMIN_PASSWORD}"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
    volumes:
      - osdata:/usr/share/opensearch/data

  dashboards:
    image: opensearchproject/opensearch-dashboards:2.18.0
    container_name: lawcidity-dashboards
    restart: unless-stopped
    depends_on:
      - opensearch
    environment:
      OPENSEARCH_HOSTS: '["https://opensearch:9200"]'
      OPENSEARCH_USERNAME: "admin"
      OPENSEARCH_PASSWORD: "${OPENSEARCH_INITIAL_ADMIN_PASSWORD}"
      OPENSEARCH_SSL_VERIFICATIONMODE: "none"
    ports:
      - "5601:5601"

volumes:
  pgdata:
  osdata:
